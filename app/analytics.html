<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics · Classyx</title>
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="/src/app/app.css" />
  </head>
  <body class="app">
    <header class="app-header">
      <div class="container app-header__inner">
        <a class="app-logo" href="/app/dashboard.html">
          <span class="app-logo__mark" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10 12 5 2 10l10 5 10-5Z"/><path d="M6 12v5c0 1 2.7 2.5 6 2.5s6-1.5 6-2.5v-5"/></svg>
          </span>
          Classyx
        </a>
        <div class="app-header__spacer"></div>
        <a class="btn btn-ghost btn-sm" href="/app/child.html">Study mode</a>
        <button class="btn btn-ghost btn-sm" data-signout type="button">Sign out</button>
      </div>
    </header>

    <main class="app-main">
      <div class="container">
        <a class="btn btn-ghost btn-sm" href="/app/dashboard.html" style="margin-bottom:18px">← Back to dashboard</a>

        <div class="page-head" id="child-header">
          <div>
            <h1 id="child-name">Loading…</h1>
            <p id="child-grade" class="muted"></p>
          </div>
          <div class="page-head__actions">
            <div id="streak-badge-slot"></div>
            <button class="icon-btn" id="settings-btn" type="button" aria-label="Child settings" title="Settings">⚙️</button>
          </div>
        </div>

        <div class="seg" role="tablist" aria-label="Time period" style="margin-bottom:22px">
          <button role="tab" aria-selected="true" data-period="week" type="button">This Week</button>
          <button role="tab" aria-selected="false" data-period="month" type="button">This Month</button>
        </div>

        <div id="analytics-content" aria-live="polite">
          <div class="generating"><span class="spinner spinner--lg"></span><p class="muted">Loading…</p></div>
        </div>
      </div>
    </main>

    <div id="chart-tooltip" class="chart-tooltip" role="tooltip" hidden>
      <span class="chart-tooltip__day"></span>
      <span class="chart-tooltip__minutes"></span>
    </div>

    <!-- Settings panel -->
    <div class="overlay" id="settings-overlay" hidden>
      <div class="modal settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <button class="modal-close" id="settings-close" type="button" aria-label="Close">&times;</button>
        <div class="settings-layout">
          <nav class="settings-sidebar" aria-label="Settings sections">
            <button class="settings-tab" data-settings-tab="goals" type="button" aria-selected="true">Goals</button>
            <button class="settings-tab" data-settings-tab="general" type="button" aria-selected="false">General</button>
            <button class="settings-tab" data-settings-tab="billing" type="button" aria-selected="false">Billing</button>
            <button class="settings-tab settings-tab--danger" data-settings-tab="danger" type="button" aria-selected="false">Danger Zone</button>
          </nav>

          <div class="settings-panel-body">
            <h2 id="settings-title" class="settings-panel-title">Goals</h2>

            <div class="settings-pane" data-settings-pane="goals">
              <label for="goal-input" class="settings-label">Daily study goal</label>
              <div class="settings-goal-row">
                <input type="number" class="input" id="goal-input" min="5" max="600" step="5" />
                <button class="btn btn-primary btn-sm" id="goal-save" type="button">Set</button>
              </div>
              <p class="settings-current-goal" id="current-goal-label">Current goal: 30 min/day</p>
              <p class="form-status" id="goal-status" role="status" aria-live="polite"></p>
            </div>

            <div class="settings-pane hidden" data-settings-pane="general">
              <div class="settings-field">
                <span class="settings-field__label">Name</span>
                <span class="settings-field__value" id="general-name"></span>
              </div>
              <div class="settings-field">
                <span class="settings-field__label">Grade</span>
                <span class="settings-field__value" id="general-grade"></span>
              </div>
            </div>

            <div class="settings-pane hidden" data-settings-pane="billing">
              <p class="settings-plan-label">Free plan</p>
              <p class="muted" style="margin-bottom:14px">Upgrade for more children, deeper analytics, and priority support.</p>
              <button class="btn btn-primary" id="upgrade-btn" type="button">Upgrade</button>
            </div>

            <div class="settings-pane hidden" data-settings-pane="danger">
              <p class="muted" style="margin-bottom:14px">Removing a profile permanently deletes their data. This can't be undone.</p>
              <button class="btn btn-danger btn-block" id="remove-child-btn" type="button">Remove child</button>
              <p class="form-status" id="remove-status" role="status" aria-live="polite"></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/app/analytics.js"></script>
  </body>
</html>
