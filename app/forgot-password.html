<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot password · Classyx</title>
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="/src/app/app.css" />
  </head>
  <body class="app">
    <main class="auth-wrap">
      <div class="card auth-card">
        <a class="app-logo" href="/index.html">
          <span class="app-logo__mark" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10 12 5 2 10l10 5 10-5Z"/><path d="M6 12v5c0 1 2.7 2.5 6 2.5s6-1.5 6-2.5v-5"/></svg>
          </span>
          Classyx
        </a>

        <h1 style="font-size:1.3rem;margin:18px 0 6px">Reset your password</h1>
        <p class="muted" style="margin-bottom:18px">Enter your email and we'll send you a link to set a new password.</p>

        <form id="forgot-form" novalidate>
          <div class="form-row">
            <label for="email">Email</label>
            <input class="input" id="email" type="email" autocomplete="email" required placeholder="you@example.com" />
          </div>
          <button class="btn btn-primary btn-lg btn-block" id="submit" type="submit">Send reset link</button>
          <p class="form-status" data-status role="status" aria-live="polite"></p>
        </form>

        <p class="hint" style="margin-top:14px;text-align:center">
          <a href="/app/login.html">← Back to sign in</a>
        </p>
      </div>
    </main>
    <script type="module" src="/src/app/forgot-password.js"></script>
  </body>
</html>
