<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in · Classyx</title>
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="/src/app/app.css" />
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  </head>
  <body class="app">
    <main class="auth-wrap">
      <div class="card auth-card">
        <a class="app-logo" href="/index.html">
          <span class="app-logo__mark" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10 12 5 2 10l10 5 10-5Z"/><path d="M6 12v5c0 1 2.7 2.5 6 2.5s6-1.5 6-2.5v-5"/></svg>
          </span>
          Classyx
        </a>

        <div class="auth-tabs" role="tablist">
          <button class="auth-tab" role="tab" aria-selected="true" data-mode="signin">Sign in</button>
          <button class="auth-tab" role="tab" aria-selected="false" data-mode="signup">Create account</button>
        </div>

        <button class="btn btn-google btn-block" id="google-signin" type="button">
          <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
            <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62Z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.71H.96v2.33A9 9 0 0 0 9 18Z"/>
            <path fill="#FBBC05" d="M3.97 10.71A5.4 5.4 0 0 1 3.69 9c0-.59.1-1.17.28-1.71V4.96H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.04l3.01-2.33Z"/>
            <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.59-2.59C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.96l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58Z"/>
          </svg>
          Continue with Google
        </button>

        <!-- Account-less student entry. Fully separate from #auth-form — never
             touches the sign in / create account logic. -->
        <div id="student-toggle-row">
          <button class="btn btn-ghost btn-block" id="student-toggle" type="button" aria-expanded="false">
            I'm a student — enter my code
          </button>
          <div id="student-code-section" class="hidden" style="margin-top:14px">
            <div class="form-row">
              <label for="student-code">Your 6-character code</label>
              <input
                class="input"
                id="student-code"
                type="text"
                maxlength="6"
                autocomplete="off"
                placeholder="e.g. a3k9mz"
                style="text-align:center;letter-spacing:.3em;text-transform:lowercase"
              />
            </div>
            <button class="btn btn-primary btn-block" id="student-start-btn" type="button">Start studying</button>
            <p class="form-status" data-student-status role="status" aria-live="polite"></p>
          </div>
        </div>

        <div class="divider">or</div>

        <form id="auth-form" novalidate>
          <div class="form-row">
            <label for="email">Parent email</label>
            <input class="input" id="email" type="email" autocomplete="email" required placeholder="you@example.com" />
          </div>

          <!-- Role selection (Create account only). Shown after "Continue with
               email", before the password step. -->
          <div id="role-step" class="hidden">
            <p class="role-step__heading">Who are you?</p>
            <div class="role-cards" role="group" aria-label="Who are you?">
              <button type="button" class="role-card" data-role="self" aria-pressed="false">
                <span class="role-card__icon">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>
                </span>
                <span class="role-card__text">
                  <span class="role-card__label">Just me</span>
                  <span class="role-card__sub">I want to track my own learning</span>
                </span>
              </button>

              <button type="button" class="role-card" data-role="kid" aria-pressed="false">
                <span class="role-card__icon">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.6 5.27 5.82.85-4.21 4.1.99 5.78L12 15.27l-5.2 2.73.99-5.78-4.21-4.1 5.82-.85L12 2Z"/></svg>
                </span>
                <span class="role-card__text">
                  <span class="role-card__label">I'm a student</span>
                  <span class="role-card__sub">My parent gave me a code to enter</span>
                  <span class="role-card__note">No account needed — just enter the code your parent gave you.</span>
                </span>
              </button>

              <button type="button" class="role-card" data-role="parent" aria-pressed="false">
                <span class="role-card__icon">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.5 9 8 11 4.5-2 8-6 8-11V5l-8-3Z"/></svg>
                </span>
                <span class="role-card__text">
                  <span class="role-card__label">I'm a parent</span>
                  <span class="role-card__sub">I want to support my child's learning</span>
                </span>
              </button>
            </div>
            <button type="button" class="btn btn-ghost btn-block" id="role-back">← Back</button>
          </div>

          <!-- Password section. Hidden during the "Create account" email and
               role steps, then revealed (with strength meter + confirm) after
               a role is chosen. -->
          <div id="password-section">
            <div class="form-row">
              <label for="password">Password</label>
              <div class="password-wrap">
                <input class="input" id="password" type="password" autocomplete="current-password" required minlength="8" placeholder="Password" />
                <button type="button" class="password-toggle" id="password-toggle" aria-label="Show password" aria-pressed="false">
                  <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="eye-closed hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.4 18.4 0 0 1 4.22-5.06M9.9 4.24A10.6 10.6 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><path d="M1 1l22 22"/></svg>
                </button>
              </div>
            </div>

            <!-- Strength meter (Create account only) -->
            <div id="strength" class="strength hidden" data-score="0" aria-live="polite">
              <div class="strength__track"><span id="strength-fill" class="strength__fill"></span></div>
              <div class="strength__row">
                <span class="strength__label" id="strength-label">—</span>
                <span class="strength__reqs" id="strength-reqs"></span>
              </div>
            </div>

            <!-- Confirm password (Create account only) -->
            <div class="form-row hidden" id="confirm-row">
              <label for="confirm">Confirm password</label>
              <div class="password-wrap">
                <input class="input" id="confirm" type="password" autocomplete="new-password" placeholder="confirm password" />
                <button type="button" class="password-toggle" id="confirm-toggle" aria-label="Show password" aria-pressed="false">
                  <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="eye-closed hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.4 18.4 0 0 1 4.22-5.06M9.9 4.24A10.6 10.6 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><path d="M1 1l22 22"/></svg>
                </button>
              </div>
              <span class="hint" id="match-hint"></span>
            </div>

          </div>

          <div id="turnstile-row" class="form-row hidden"><div id="turnstile-widget"></div></div>
          <button class="btn btn-primary btn-lg btn-block" id="submit" type="submit">Sign in</button>
          <p class="hint" id="forgot-password-row" style="text-align:center;margin-top:10px">
            <a class="btn-link" href="/app/forgot-password.html">Forgot password?</a>
          </p>
          <p class="hint hidden" id="signup-consent" style="text-align:center;margin-top:8px">By creating an account you agree to Classyx's <a href='/privacy-policy.html' target='_blank' style='color:#2563eb'>Privacy Policy</a> and <a href='/tos.html' target='_blank' style='color:#2563eb'>Terms of Service</a>.</p>
          <p class="form-status" data-status role="status" aria-live="polite"></p>
        </form>

      </div>
    </main>
    <script type="module" src="/src/app/login.js"></script>
  </body>
</html>
