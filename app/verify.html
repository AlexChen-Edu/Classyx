<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check your email · Classyx</title>
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="/src/app/app.css" />
  </head>
  <body class="app">
    <main class="auth-wrap">
      <div class="card auth-card" style="text-align:center">
        <a class="app-logo" href="/index.html" style="justify-content:center;display:flex">
          <span class="app-logo__mark" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10 12 5 2 10l10 5 10-5Z"/><path d="M6 12v5c0 1 2.7 2.5 6 2.5s6-1.5 6-2.5v-5"/></svg>
          </span>
          Classyx
        </a>

        <h1 style="margin-top:18px;font-size:1.4rem">Check your email</h1>
        <p class="muted" id="verify-sub" style="margin-top:8px">
          We sent a 6-digit code to your email. Enter it below.
        </p>

        <form id="verify-form" novalidate>
          <div class="pin-inputs" id="pin-inputs" style="margin:22px 0 4px">
            <input class="pin-box" type="text" inputmode="numeric" maxlength="1" aria-label="Code digit 1" />
            <input class="pin-box" type="text" inputmode="numeric" maxlength="1" aria-label="Code digit 2" />
            <input class="pin-box" type="text" inputmode="numeric" maxlength="1" aria-label="Code digit 3" />
            <input class="pin-box" type="text" inputmode="numeric" maxlength="1" aria-label="Code digit 4" />
            <input class="pin-box" type="text" inputmode="numeric" maxlength="1" aria-label="Code digit 5" />
            <input class="pin-box" type="text" inputmode="numeric" maxlength="1" aria-label="Code digit 6" />
          </div>
          <button class="btn btn-primary btn-lg btn-block" id="submit" type="submit" style="margin-top:18px">Verify</button>
          <p class="form-status" data-status role="status" aria-live="polite"></p>
        </form>

        <p class="hint" style="margin-top:14px">
          Didn't get a code? <a href="#" id="resend-link">Resend code</a>
        </p>
      </div>
    </main>
    <script type="module" src="/src/app/verify.js"></script>
  </body>
</html>
